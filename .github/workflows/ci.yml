name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
            win_arch: AMD64
          - os: windows-latest
            win_arch: ARM64
    steps:
      - uses: actions/checkout@v4
      - name: Setup QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.win_arch == 'ARM64' && 'amd64_arm64' || 'amd64' }}
      - name: Verify vendored libmspack tarball
        run: >
          python -c "from pathlib import Path; path=Path('src/pylibmspack/vendor/libmspack_0.10.1.orig.tar.xz');
          (path.exists() or (_ for _ in ()).throw(SystemExit(f'Missing vendored tarball: {path}')));
          print(f'Found {path}')"
      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: ${{ matrix.win_arch || 'AMD64' }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest -q {project}/tests"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}${{ matrix.win_arch && format('-{0}', matrix.win_arch) || '' }}
          path: wheelhouse/*.whl
