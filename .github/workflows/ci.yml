name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: python -m pip install --upgrade pip "ruff>=0.15.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: C binding warning check
        run: python scripts/check_c_binding.py
      - name: Parser exposure check
        run: python scripts/check_parser_exposure.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify vendored libmspack tarball
        run: >
          python -c "from pathlib import Path; path=Path('src/pylibmspack/vendor/libmspack_0.11.orig.tar.gz');
          (path.exists() or (_ for _ in ()).throw(SystemExit(f'Missing vendored tarball: {path}')));
          print(f'Found {path}')"
      - name: Install package and test tools
        run: python -m pip install --upgrade pip ".[dev]"
      - name: Run tests
        run: python -m pytest

  build:
    name: Build wheels (${{ matrix.os }}${{ matrix.linux_arch && format(' {0}', matrix.linux_arch) || '' }}${{ matrix.win_arch && format(' {0}', matrix.win_arch) || '' }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            linux_arch: x86_64
          - os: ubuntu-latest
            linux_arch: aarch64
          - os: macos-latest
          - os: windows-latest
            win_arch: AMD64
          - os: windows-latest
            win_arch: ARM64
    steps:
      - uses: actions/checkout@v7
      - name: Setup QEMU
        if: runner.os == 'Linux' && matrix.linux_arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.win_arch == 'ARM64' && 'amd64_arm64' || 'amd64' }}
      - name: Verify vendored libmspack tarball
        run: >
          python -c "from pathlib import Path; path=Path('src/pylibmspack/vendor/libmspack_0.11.orig.tar.gz');
          (path.exists() or (_ for _ in ()).throw(SystemExit(f'Missing vendored tarball: {path}')));
          print(f'Found {path}')"
      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: ${{ matrix.linux_arch || '' }}
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: ${{ matrix.win_arch || 'AMD64' }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest -q {project}/tests"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}${{ matrix.linux_arch && format('-{0}', matrix.linux_arch) || '' }}${{ matrix.win_arch && format('-{0}', matrix.win_arch) || '' }}
          path: wheelhouse/*.whl
