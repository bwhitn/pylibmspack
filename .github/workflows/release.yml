name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify vendored libmspack tarball
        run: >
          python -c "from pathlib import Path; path=Path('src/pymspack/vendor/libmspack_0.10.1.orig.tar.xz');
          (path.exists() or (_ for _ in ()).throw(SystemExit(f'Missing vendored tarball: {path}')));
          print(f'Found {path}')"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest -q {project}/tests"
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-testpypi:
    name: Publish (TestPyPI)
    runs-on: ubuntu-latest
    needs: [sdist, wheels]
    outputs:
      release_tag: ${{ steps.resolve-tag.outputs.release_tag }}
    steps:
      - name: Resolve tag
        id: resolve-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Validate tag format
        shell: bash
        run: |
          TAG="${{ steps.resolve-tag.outputs.release_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\\.[0-9]+\\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: $TAG"
            exit 1
          fi
          if ! git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            echo "Tag not found: $TAG"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish (PyPI)
    runs-on: ubuntu-latest
    needs: [publish-testpypi]
    environment:
      name: pypi
      url: https://pypi.org/project/pymspack/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish-testpypi.outputs.release_tag }}
          files: dist/**
