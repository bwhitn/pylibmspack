name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install project and audit tool
        run: |
          python -m pip install --upgrade pip "setuptools>=83.0.0" wheel
          python -m pip install --upgrade pip-audit ".[dev]"
      - name: Audit installed Python dependencies
        run: python -m pip_audit --local

  codeql-python:
    name: CodeQL Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  codeql-cpp:
    name: CodeQL C/C++
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
      - name: Build extension for CodeQL
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python setup.py build_ext --inplace
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"

  native-static:
    name: Native Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install native analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck
      - name: Run native static checks
        run: python scripts/check_native_static.py --require

  sanitizer:
    name: ASan/UBSan Smoke Tests
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CFLAGS: "-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined"
      LDFLAGS: "-fsanitize=address,undefined"
      ASAN_OPTIONS: "abort_on_error=1:detect_leaks=0:strict_string_checks=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with sanitizer flags
        run: python -m pip install --upgrade pip ".[dev]"
      - name: Locate ASan runtime
        id: asan
        run: echo "libasan=$(gcc -print-file-name=libasan.so)" >> "$GITHUB_OUTPUT"
      - name: Run tests under sanitizers
        env:
          LD_PRELOAD: ${{ steps.asan.outputs.libasan }}
        run: python -m pytest -q
      - name: Run parser fuzz smoke under sanitizers
        env:
          LD_PRELOAD: ${{ steps.asan.outputs.libasan }}
        run: python scripts/fuzz_smoke.py

  atheris:
    name: Atheris Fuzz Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and Atheris
        run: python -m pip install --upgrade pip ".[dev,fuzz]"
      - name: Run Atheris targets
        run: >
          python scripts/run_atheris.py
          --corpus-root build/fuzz-corpus/atheris
          --artifact-dir build/fuzz-artifacts/atheris
          --exercise-disk
          --runs 128
      - name: Upload Atheris crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atheris-fuzz-artifacts
          path: build/fuzz-artifacts/atheris

  libfuzzer:
    name: libFuzzer Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-rt-dev
      - name: Build libFuzzer targets
        run: python scripts/build_libfuzzer.py --out-dir build/libfuzzer
      - name: Run libFuzzer targets
        run: >
          python scripts/run_libfuzzer.py
          --fuzzers-dir build/libfuzzer
          --corpus-root build/fuzz-corpus/libfuzzer
          --artifact-dir build/fuzz-artifacts/libfuzzer
          --runs 128
      - name: Upload libFuzzer crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: libfuzzer-fuzz-artifacts
          path: build/fuzz-artifacts/libfuzzer

  scorecard:
    name: OpenSSF Scorecard
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
